<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sanjana</title>
    <meta name="description" content="Get in touch with me for collaborations and opportunities.">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <a href="index.html" class="logo">SANJU.</a>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="certifications.html">Certifications</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-header fade-in">
            <h1 class="page-title">Get in <span class="gradient-text">Touch</span></h1>
            <p style="color: var(--text-secondary);">Have a question or want to work together? Leave a message.</p>
        </div>

        <section class="contact-container fade-in">
            
            <!-- Contact Info -->
            <div class="contact-info">
                <div class="glass-card">
                    <div class="info-item" style="margin-bottom: 25px;">
                        <div class="info-icon">📧</div>
                        <div class="info-text">
                            <h4>Email Me</h4>
                            <a href="mailto:hello@example.com">hello@example.com</a>
                        </div>
                    </div>
                    
                    <div class="info-item" style="margin-bottom: 25px;">
                        <div class="info-icon">📍</div>
                        <div class="info-text">
                            <h4>Location</h4>
                            <p>City, Country</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon">🔗</div>
                        <div class="info-text">
                            <h4>Social Profiles</h4>
                            <div style="display: flex; gap: 10px; margin-top: 5px;">
                                <a href="#">LinkedIn</a> &bull;
                                <a href="#">GitHub</a> &bull;
                                <a href="#">Twitter</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="glass-card">
                <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Form submitted! (Demo only)');">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" class="form-control" placeholder="How can I help you?" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Send Message</button>
                </form>
            </div>

        </section>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
