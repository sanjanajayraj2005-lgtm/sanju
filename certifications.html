<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Sanjana</title>
    <meta name="description" content="View my professional certifications and awards.">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <a href="index.html" class="logo">SANJU.</a>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="certifications.html">Certifications</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-header fade-in">
            <h1 class="page-title">My <span class="gradient-text">Certifications</span></h1>
            <p style="color: var(--text-secondary);">Click on any certificate to view it in full screen.</p>
        </div>

        <section class="cert-grid">
            <!-- Certificate 1 -->
            <div class="glass-card cert-card fade-in">
                <div class="cert-img-container">
                    <!-- Note: You can replace this demo certificate later -->
                    <img src="assets/images/certificate1.png" alt="Professional Certification">
                </div>
                <h3 class="cert-title">Advanced Web Development</h3>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">Issued by Tech Academy, 2023</p>
            </div>
            
            <!-- You can add more certificate cards here later -->
        </section>

        <!-- The Modal (Lightbox) -->
        <div id="certModal" class="modal">
            <span class="close">&times;</span>
            <img class="modal-content" id="img01" alt="Certificate Full View">
        </div>

    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
